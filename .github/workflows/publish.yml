name: Publish to PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Manual version override (e.g., 1.0.0)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build toml

      - name: Extract version
        id: version
        run: |
          python -c "
          import toml, os
          override = os.environ.get('VERSION_OVERRIDE', '')
          if override:
              version = override
          else:
              data = toml.load('pyproject.toml')
              version = data['project']['version']
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'VERSION={version}\n')
          
          exists = os.system(f'git rev-parse v{version} >/dev/null 2>&1') == 0
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              exists_str = 'true' if exists else 'false'
              f.write(f'EXISTS={exists_str}\n')
          "
        env:
          VERSION_OVERRIDE: ${{ github.event.inputs.version_override }}

      - name: Create Tag
        if: github.ref == 'refs/heads/main' && steps.version.outputs.EXISTS == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v${{ steps.version.outputs.VERSION }}" -m "Release v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Build package
        run: python -m build

      - name: Create Release
        if: steps.version.outputs.EXISTS == 'false' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package to PyPI
        if: steps.version.outputs.EXISTS == 'false' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
