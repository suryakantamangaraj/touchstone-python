name: Publish to PyPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Manual version override (e.g., 1.0.0)'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Extract and bump version
        id: version
        env:
          VERSION_OVERRIDE: ${{ github.event.inputs.version_override }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "NEEDS_BUMP=false" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "IS_TAG=false" >> $GITHUB_OUTPUT
          
          python - <<'EOF'
          import os, re
          override = os.environ.get('VERSION_OVERRIDE', '')
          with open('pyproject.toml', 'r') as f:
              content = f.read()
          match = re.search(r'version\s*=\s*"([^"]+)"', content)
          if not match:
              print('Could not find version in pyproject.toml')
              exit(1)
          current_version = match.group(1)

          if override:
              new_version = override
              needs_bump = True
          else:
              exists = os.system(f'git rev-parse v{current_version} >/dev/null 2>&1') == 0
              if exists:
                  parts = current_version.split('.')
                  parts[-1] = str(int(parts[-1]) + 1)
                  new_version = '.'.join(parts)
                  needs_bump = True
              else:
                  new_version = current_version
                  needs_bump = False

          if needs_bump:
              new_content = content.replace(f'version = "{current_version}"', f'version = "{new_version}"')
              with open('pyproject.toml', 'w') as f:
                  f.write(new_content)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'VERSION={new_version}\n')
              f.write(f'NEEDS_BUMP={"true" if needs_bump else "false"}\n')
          EOF

      - name: Commit version bump
        if: steps.version.outputs.NEEDS_BUMP == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }} [skip ci]"
          git push origin HEAD:main

      - name: Create Tag
        if: steps.version.outputs.IS_TAG == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v${{ steps.version.outputs.VERSION }}" -m "Release v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Build package
        run: python -m build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Removing explicit 'password' configures the action to use PyPI Trusted Publishing (OIDC).

      - name: Publish package to GitHub Packages
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m pip install twine
          twine upload --repository-url https://pypi.pkg.github.com/${{ github.repository_owner }}/ dist/*
